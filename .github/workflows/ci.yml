name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check vibe/ tests/
      - run: ruff format --check vibe/ tests/

  unit-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -x --tb=short -q

  eval:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && !github.event.pull_request.draft)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"
      - name: Run eval suite
        run: |
          python -m vibe.cli.main eval run --limit 20
        env:
          VIBE_BASE_URL: ${{ secrets.VIBE_BASE_URL || 'http://localhost:11434' }}
          VIBE_MODEL: ${{ secrets.VIBE_CI_MODEL || 'default' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      - name: Regression check and Report Generation
        run: python scripts/ci_eval_report.py
      - name: Post PR Comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('eval_report.md')) {
              const report = fs.readFileSync('eval_report.md', 'utf8');
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
            }
