name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check vibe/ tests/
      - run: ruff format --check vibe/ tests/

  unit-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -x --tb=short -q

  eval:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && !github.event.pull_request.draft)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"
      - name: Run eval suite
        run: |
          python -m vibe.cli.main eval run --limit 20
        env:
          VIBE_BASE_URL: ${{ secrets.VIBE_BASE_URL || 'http://localhost:11434' }}
          VIBE_MODEL: ${{ secrets.VIBE_CI_MODEL || 'default' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      - name: Regression check
        run: |
          python -c "
          import json, sys
          from vibe.harness.memory.eval_store import EvalStore
          store = EvalStore()
          summary = store.summary()
          score = summary['score']
          print(f'Eval score: {score:.2%}')
          # Load baseline
          try:
              with open('docs/baseline_scorecard.json') as f:
                  baseline = json.load(f)
              baseline_score = baseline.get('overall_score', 1.0)
              if score < baseline_score * 0.95:
                  print(f'REGRESSION: {score:.2%} < {baseline_score * 0.95:.2%} (baseline * 0.95)')
                  sys.exit(1)
              print(f'OK: within 5% of baseline ({baseline_score:.2%})')
          except FileNotFoundError:
              print('No baseline found, skipping regression check')
          "
