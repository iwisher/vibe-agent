# Vibe Agent Configuration - v0.2.0-alpha
# Save this file to ~/.vibe/config.yaml

# 1. Global Defaults
llm:
  default_model: "kimi-smart"  # Start with the best Kimi model
  timeout: 120.0

# 2. Providers (Connection Endpoints)
providers:
  # Kimi Developer API
  kimi-api:
    base_url: "https://api.moonshot.cn"
    adapter: "anthropic"
    api_key_env_var: "KIMI_API_KEY"

  # Kimi Coding Endpoint (requires specific headers)
  kimi-coding:
    base_url: "https://api.kimi.com/coding"
    adapter: "openai"
    api_key_env_var: "KIMI_API_KEY"
    extra_headers:
      "HTTP-Referer": "https://github.com/RooCoder/Roo-Code"
      "X-Title": "Roo Code"
      "User-Agent": "Kimi CLI"  # Required by some Kimi endpoints to verify "Coding Agent" status

  # OpenRouter simulating Roo Code (Cline)
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    adapter: "openai"
    api_key_env_var: "OPENROUTER_API_KEY"
    extra_headers:
      "HTTP-Referer": "https://github.com/RooCoder/Roo-Code"
      "X-Title": "Roo Code"

  # Applesay Provider
  applesay-proxy:
    base_url: "http://ai-api.applesay.cn"
    adapter: "openai"
    api_key_env_var: "APPLESAY_API_KEY"

# 3. Model Registry
models:
  kimi-fast:
    provider: "kimi-api"
    model_id: "moonshot-v1-8k"
  
  kimi-smart:
    provider: "kimi-api"
    model_id: "moonshot-v1-32k"

  kimi-for-coding:
    provider: "kimi-coding"
    model_id: "kimi-latest"
  
  pro-model:
    provider: "openrouter"
    model_id: "anthropic/claude-3.5-sonnet"
  
  legacy-backup:
    provider: "applesay-proxy"
    model_id: "qwen-max"

# 4. Fallback Chain
fallback:
  enabled: true
  chain:
    - "kimi-smart"
    - "kimi-for-coding" # Try Kimi's specialized coding endpoint
    - "pro-model"
    - "legacy-backup"
  max_retries: 2
  health_check_timeout: 10.0
  circuit_breaker_threshold: 1
  circuit_breaker_cooldown: 600.0

# 5. Operational Settings
query_loop:
  max_iterations: 50
  max_context_tokens: 128000

# 6. Logging
# Logs are stored per-session with automatic cleanup
logging:
  enabled: true
  log_dir: "~/.vibe/logs"
  max_file_size_mb: 10
  retention_days: 5
